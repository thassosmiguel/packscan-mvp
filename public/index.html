<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackScan Pro | MVP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="container">
        <h1>PackScan Pro 📦</h1>
        
        <div class="main-layout">
            <div class="col-left">
                <div class="camera-preview">
                    <video id="webcam" autoplay playsinline></video>
                    <div id="scan-line" class="scan-line" style="display: none;"></div>
                    <div id="camera-overlay">
                        <button onclick="iniciarScan()">Ativar Scanner</button>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btn-virar" onclick="virarCamera()" class="btn-flip" style="display: none; flex: 1;">Girar Câmera</button>
                    <button id="btn-parar" onclick="pararScan()" class="btn-stop" style="display: none; flex: 1; margin-top:0;">Encerrar</button>
                </div>

                <div class="input-group">
                    <div class="dimensions">
                        <input type="number" id="largura" placeholder="Larg.">
                        <input type="number" id="altura" placeholder="Alt.">
                        <input type="number" id="profundidade" placeholder="Prof.">
                    </div>
                    <select id="material">
                        <option value="papelão">Papelão Corrugado</option>
                        <option value="kraft">Papel Kraft</option>
                        <option value="premium">Premium Branco</option>
                    </select>
                    <label>Logo (Opcional):</label>
                    <input type="file" id="logoInput" accept="image/*">
                    <button class="btn-main" onclick="calcularEGerar()">Simular Orçamento</button>
                </div>
            </div>

            <div class="col-right">
                <div id="resultado"></div>
                <div id="canvas-wrapper">
                    <div id="canvas-3d"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

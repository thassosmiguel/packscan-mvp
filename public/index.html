<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackScan - MVP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>PackScan 📦</h1>
        <p>Simulação 3D e Orçamento de Embalagens</p>

        <div class="input-group">
            <input type="number" id="largura" placeholder="Largura (cm)">
            <input type="number" id="altura" placeholder="Altura (cm)">
            <input type="number" id="profundidade" placeholder="Profundidade (cm)">
            
            <select id="material">
                <option value="papelão">Papelão</option>
                <option value="kraft">Kraft</option>
                <option value="premium">Premium</option>
            </select>

            <button onclick="calcularOrcamento()">Calcular e Gerar 3D</button>
        </div>

        <div id="resultado"></div>
        <div id="canvas-3d"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
